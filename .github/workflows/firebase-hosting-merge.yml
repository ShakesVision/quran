# Deploy to Firebase Hosting on push to master
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build with Node 18 (Angular 13 compatibility)
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci && npm run build:prod

      # Switch to Node 20 for firebase-tools (requires Node >= 20)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HIFZ_HELPER_PWA }}'
          channelId: live
          projectId: hifz-helper-pwa
