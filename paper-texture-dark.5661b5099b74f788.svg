<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <pattern id="grain-dark" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#1A1D21"/>
      <circle cx="10" cy="10" r="0.3" fill="#252A30" opacity="0.4"/>
      <circle cx="30" cy="20" r="0.2" fill="#252A30" opacity="0.35"/>
      <circle cx="50" cy="40" r="0.35" fill="#252A30" opacity="0.3"/>
      <circle cx="70" cy="60" r="0.25" fill="#252A30" opacity="0.4"/>
      <circle cx="90" cy="80" r="0.3" fill="#252A30" opacity="0.35"/>
      <circle cx="20" cy="70" r="0.2" fill="#2D333B" opacity="0.25"/>
      <circle cx="40" cy="90" r="0.3" fill="#2D333B" opacity="0.3"/>
      <circle cx="60" cy="30" r="0.25" fill="#2D333B" opacity="0.25"/>
      <circle cx="80" cy="50" r="0.2" fill="#2D333B" opacity="0.3"/>
      <circle cx="15" cy="45" r="0.15" fill="#252A30" opacity="0.3"/>
      <circle cx="85" cy="15" r="0.2" fill="#252A30" opacity="0.35"/>
      <circle cx="45" cy="85" r="0.25" fill="#2D333B" opacity="0.25"/>
      <circle cx="75" cy="35" r="0.15" fill="#2D333B" opacity="0.3"/>
    </pattern>
    <!-- Subtle vignette for depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1D21" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grain-dark)"/>
  <rect width="100%" height="100%" fill="url(#vignette)"/>
  <!-- Subtle leather-like texture lines -->
  <line x1="0" y1="50" x2="400" y2="52" stroke="#2D333B" stroke-width="0.3" opacity="0.15"/>
  <line x1="0" y1="150" x2="400" y2="148" stroke="#2D333B" stroke-width="0.2" opacity="0.12"/>
  <line x1="0" y1="250" x2="400" y2="253" stroke="#2D333B" stroke-width="0.25" opacity="0.15"/>
  <line x1="0" y1="350" x2="400" y2="349" stroke="#2D333B" stroke-width="0.3" opacity="0.12"/>
</svg>

