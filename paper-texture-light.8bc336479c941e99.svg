<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <filter id="paper-light" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#FDF8F3" surfaceScale="2" result="light">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
      <feBlend in="SourceGraphic" in2="light" mode="multiply"/>
    </filter>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#FDF8F3"/>
      <circle cx="10" cy="10" r="0.3" fill="#E8E0D5" opacity="0.3"/>
      <circle cx="30" cy="20" r="0.2" fill="#E8E0D5" opacity="0.25"/>
      <circle cx="50" cy="40" r="0.35" fill="#E8E0D5" opacity="0.2"/>
      <circle cx="70" cy="60" r="0.25" fill="#E8E0D5" opacity="0.3"/>
      <circle cx="90" cy="80" r="0.3" fill="#E8E0D5" opacity="0.25"/>
      <circle cx="20" cy="70" r="0.2" fill="#D4CCC0" opacity="0.15"/>
      <circle cx="40" cy="90" r="0.3" fill="#D4CCC0" opacity="0.2"/>
      <circle cx="60" cy="30" r="0.25" fill="#D4CCC0" opacity="0.15"/>
      <circle cx="80" cy="50" r="0.2" fill="#D4CCC0" opacity="0.2"/>
      <circle cx="15" cy="45" r="0.15" fill="#E8E0D5" opacity="0.2"/>
      <circle cx="85" cy="15" r="0.2" fill="#E8E0D5" opacity="0.25"/>
      <circle cx="45" cy="85" r="0.25" fill="#D4CCC0" opacity="0.15"/>
      <circle cx="75" cy="35" r="0.15" fill="#D4CCC0" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grain)"/>
  <!-- Subtle paper fiber lines -->
  <line x1="0" y1="50" x2="400" y2="52" stroke="#E0D8CC" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="150" x2="400" y2="148" stroke="#E0D8CC" stroke-width="0.2" opacity="0.08"/>
  <line x1="0" y1="250" x2="400" y2="253" stroke="#E0D8CC" stroke-width="0.25" opacity="0.1"/>
  <line x1="0" y1="350" x2="400" y2="349" stroke="#E0D8CC" stroke-width="0.3" opacity="0.08"/>
</svg>

