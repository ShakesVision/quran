<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ 'camera.title' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label>{{ 'camera.selectLines' | translate }}</ion-label>
    <ion-select [(ngModel)]="linesPerPage" interface="action-sheet">
      <ion-select-option *ngFor="let n of lineOptions" [value]="n">{{ n }}</ion-select-option>
    </ion-select>
  </ion-item>

  <label class="capture-btn">
    <input type="file" accept="image/*" capture="environment" (change)="onFileSelected($event)" hidden />
    <ion-icon name="camera-outline"></ion-icon>
    <span>{{ 'camera.capture' | translate }}</span>
  </label>

  <div *ngIf="previewUrl" class="preview-wrap">
    <img [src]="previewUrl" alt="preview" />
  </div>

  <div *ngIf="processing" class="processing">
    <ion-spinner name="crescent"></ion-spinner>
    <p>{{ 'camera.detecting' | translate }}</p>
  </div>

  <ion-item *ngIf="detectedPage">
    <ion-label>{{ 'camera.pageFound' | translate:{ page: detectedPage } }}</ion-label>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">{{ 'camera.manualPage' | translate }}</ion-label>
    <ion-input type="number" [(ngModel)]="manualPage" [placeholder]="'camera.manualPage' | translate"></ion-input>
  </ion-item>

  <ion-button expand="block" [disabled]="!resolvedPage" (click)="openInReader()">
    {{ 'camera.openReader' | translate }}
  </ion-button>
  <ion-button expand="block" fill="outline" [disabled]="!resolvedPage" (click)="openInScanned()">
    {{ 'camera.openScanned' | translate }}
  </ion-button>
</ion-content>
