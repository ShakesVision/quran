<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ 'camera.title' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p class="hint">{{ 'camera.hint' | translate }}</p>

  <label class="capture-btn" [class.disabled]="processing">
    <input type="file" accept="image/*" capture="environment"
      (change)="onFileSelected($event)" [disabled]="processing" hidden />
    <ion-icon name="camera-outline"></ion-icon>
    <span>{{ processing ? ('camera.detecting' | translate) : ('camera.capture' | translate) }}</span>
  </label>

  <div *ngIf="previewUrl" class="preview-wrap">
    <img [src]="previewUrl" alt="preview" />
  </div>

  <div *ngIf="processing" class="processing">
    <ion-spinner name="crescent"></ion-spinner>
    <p>{{ 'camera.detecting' | translate }}</p>
  </div>

  <p *ngIf="detectedSummary && !processing" class="result-text">{{ detectedSummary }}</p>
</ion-content>
