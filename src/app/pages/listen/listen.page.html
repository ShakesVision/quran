<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Listen</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="qariSelect()" class="qari-btn">
        <ion-icon slot="start" name="person-circle-outline"></ion-icon>
        <span>{{selectedQariName || 'Qaari'}}</span>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Now Playing Card -->
  <div class="player-card" *ngIf="nowPlaying">
    <div class="player-info">
      <span class="player-number">{{nowPlaying.index}}</span>
      <div class="player-text">
        <span class="player-title">{{nowPlaying.title}}</span>
        <span class="player-title-ar ar-text">{{nowPlaying.titleAr}}</span>
      </div>
    </div>
    <audio controls [src]="audioSrc" #audioEl id="audio" class="custom-audio"></audio>
  </div>

  <!-- Qari Selector -->
  <div class="qari-selector-card">
    <ion-icon name="mic-outline" class="selector-icon"></ion-icon>
    <ion-select
      *ngIf="reciters"
      #mySelect
      value="3"
      (ionChange)="qariChanged(mySelect.value)"
      placeholder="Select Qaari"
      interface="action-sheet"
      class="qari-select">
      <ion-select-option *ngFor="let r of reciters" [value]="r.id">
        {{r.name}} (id: {{r.id}})
      </ion-select-option>
    </ion-select>
    <span class="qari-count">{{reciters.length}} reciters</span>
  </div>

  <!-- Search Bar -->
  <div class="search-container">
    <ion-searchbar
      type="text"
      class="custom-searchbar"
      placeholder="Search surah..."
      (ionChange)="queryChanged($event.target.value)"
      mode="ios">
    </ion-searchbar>
  </div>

  <!-- Surah Count -->
  <div class="surah-count" *ngIf="surahInfo">
    {{surahInfo.length}} Surahs
  </div>

  <!-- Loading -->
  <div class="loading-wrapper" *ngIf="spin">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
  </div>

  <!-- Surah List -->
  <div class="surah-list">
    <div class="surah-item" *ngFor="let s of surahInfo" (click)="listen(s, $event.target)"
      [class.playing]="nowPlaying?.index === s.index">
      <div class="surah-number">{{s.index}}</div>
      <div class="surah-info">
        <span class="surah-title">{{s.title}}</span>
        <span class="surah-meta">{{s.count}} Ayahs • {{s.type}}</span>
      </div>
      <span class="surah-title-ar ar-text">{{s.titleAr}}</span>
      <ion-icon name="play-circle" class="play-icon" *ngIf="nowPlaying?.index !== s.index"></ion-icon>
      <ion-icon name="pause-circle" class="play-icon playing" *ngIf="nowPlaying?.index === s.index" color="primary"></ion-icon>
    </div>
  </div>
</ion-content>
