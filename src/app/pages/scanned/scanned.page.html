<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Scanned Pages</ion-title>
    <ion-buttons slot="end">
      <ion-select [(ngModel)]="imgQuality" (ionChange)="loadImg(page, imgQuality)"
        interface="popover" class="quality-select">
        <ion-select-option [value]="ImageQuality.Low">Low</ion-select-option>
        <ion-select-option [value]="ImageQuality.High">High</ion-select-option>
        <ion-select-option [value]="ImageQuality.HD">HD</ion-select-option>
      </ion-select>
    </ion-buttons>
  </ion-toolbar>

  <!-- Source Selector -->
  <ion-toolbar class="source-toolbar">
    <ion-select [(ngModel)]="selectedSourceId" (ionChange)="onSourceChange($event.target.value)"
      interface="action-sheet" class="source-select" placeholder="Select Mushaf">
      <ion-select-option *ngFor="let s of sources" [value]="s.id">{{s.label}}</ion-select-option>
    </ion-select>
  </ion-toolbar>

  <!-- Juz/Surah jump controls - only for 15-line Saudi -->
  <ion-toolbar class="nav-toolbar" *ngIf="selectedSource.hasJuzSurahMeta">
    <div class="header-controls">
      <div class="control-group">
        <ion-input type="number" [min]="1" [max]="114"
          (keyup.enter)="jumpToSurah($event.target.value)"
          placeholder="Surah" [(ngModel)]="surahNumberField"
          class="compact-input"></ion-input>
        <span class="control-label">Surah</span>
      </div>

      <div class="control-group juz-group">
        <ion-input #juzInput type="number" [(ngModel)]="juzNumberField"
          (keyup.enter)="jumpToSection(juzSection.value)" [min]="1" [max]="30"
          placeholder="Juz" class="compact-input" style="max-width: 50px"></ion-input>
        <ion-select #juzSection [value]="0" (ionChange)="jumpToSection($event.target.value)"
          placeholder="Sec" class="section-select" interface="popover">
          <ion-select-option [value]="0">Start</ion-select-option>
          <ion-select-option [value]="0.25">¼</ion-select-option>
          <ion-select-option [value]="0.5">½</ion-select-option>
          <ion-select-option [value]="0.75">¾</ion-select-option>
          <ion-select-option [value]="1">End</ion-select-option>
        </ion-select>
        <span class="control-label">Juz</span>
      </div>
    </div>
  </ion-toolbar>

  <ion-progress-bar type="indeterminate" reversed="true" *ngIf="loading" color="primary"></ion-progress-bar>
</ion-header>

<ion-content scrollX="true" scrollY="true">
  <!-- Error State -->
  <div class="error-state" *ngIf="errorLoading">
    <ion-icon name="cloud-offline-outline" class="error-icon"></ion-icon>
    <h3>Could not load scanned pages</h3>
    <p>Please check your connection and try again.</p>
    <ion-button fill="outline" (click)="setupLinks()">
      <ion-icon name="refresh-outline" slot="start"></ion-icon>
      Retry
    </ion-button>
  </div>

  <!-- Image Viewer -->
  <pinch-zoom *ngIf="!errorLoading && urls.length > 0" [properties]="zoomProperties">
    <div class="image-wrapper">
      <ion-img style="visibility: hidden; width: 0;" [src]="urls[0]"></ion-img>
      <ion-img [src]="urls[1]" class="main-image"></ion-img>
      <ion-img style="visibility: hidden; width: 0;" [src]="urls[2]"></ion-img>
    </div>
  </pinch-zoom>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!errorLoading && urls.length === 0 && !loading">
    <ion-icon name="image-outline" class="empty-icon"></ion-icon>
    <p>Select a mushaf source to view scanned pages</p>
  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="footer-toolbar">
    <div class="footer-nav">
      <ion-button shape="round" fill="clear" size="large"
        [disabled]="page >= (selectedSource.totalPages || 9999)"
        (click)="loadImg((+page)+1, imgQuality)">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
      <div class="page-info">
        <ion-input (keyup.enter)="loadImg(page, imgQuality)" type="number"
          placeholder="Page" [(ngModel)]="page" class="page-input"></ion-input>
        <span class="page-total" *ngIf="selectedSource.totalPages">
          / {{selectedSource.totalPages}}
        </span>
      </div>
      <ion-button shape="round" fill="clear" size="large"
        [disabled]="page <= 1"
        (click)="loadImg(page-1, imgQuality)">
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
